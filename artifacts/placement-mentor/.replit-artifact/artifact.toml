kind = "web"
previewPath = "/"
title = "AI Placement Mentor"
version = "1.0.0"
id = "artifacts/placement-mentor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20980

[services.development]
run = "pnpm --filter @workspace/placement-mentor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/placement-mentor", "run", "build" ]
publicDir = "artifacts/placement-mentor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20980"
BASE_PATH = "/"
